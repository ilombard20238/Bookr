<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bookr Careers</title>
</head>

<body style="font-family: Arial; background:#f8fafc; padding:40px;">

<h1>Bookr Careers - Apply</h1>

<form id="form">
  <input id="name" placeholder="Name" required><br><br>
  <input id="email" placeholder="Email" required><br><br>
  <input id="phone" placeholder="Phone"><br><br>

  <textarea id="resume" placeholder="Paste resume..." rows="10" cols="50"></textarea><br><br>

  <button type="button" onclick="fillSample()">Use Sample</button>
  <button type="submit">Submit</button>
</form>

<p id="status"></p>

<script>
const webhookUrl = "https://lemohead123.app.n8n.cloud/webhook-test/1c8dfa91-cf76-41b6-8b82-981cbe20e295";

function fillSample(){
  document.getElementById("name").value = "Emily Johnson";
  document.getElementById("email").value = "emily@email.com";
  document.getElementById("phone").value = "555-1234";
  document.getElementById("resume").value = "Data Analyst with Python, SQL, dashboards, 3+ years experience.";
}

document.getElementById("form").addEventListener("submit", async (e)=>{
  e.preventDefault();

  document.getElementById("status").innerText = "Submitting...";

  const payload = {
    name: document.getElementById("name").value,
    email: document.getElementById("email").value,
    phone: document.getElementById("phone").value,
    job: "Data Analyst",
    resume_text: document.getElementById("resume").value
  };

  try{
    const res = await fetch(webhookUrl,{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify(payload)
    });

    document.getElementById("status").innerText = "✅ Sent!";
  }catch(err){
    document.getElementById("status").innerText = "❌ Failed (check n8n)";
    console.log(err);
  }
});
</script>

</body>
</html>
